spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# JWT — must be ≥64 chars for HmacSHA512
jwt.secret=JWTSecretKeyForTestingHmacSHA512NeedsAtLeast64BytesForSecurity1!
jwt.expiration=43200

# Point mail at a non-existent local host so the bean is created but nothing is sent
spring.mail.host=localhost
spring.mail.port=3025

# Public URIs (mirrors main application.properties default)
uri.authorized=/api/plugin, /swagger, /public, /api/auth, /hello, /api/hello, /api/campaign/accept, /v3/api-docs, /swagger-ui, /health
