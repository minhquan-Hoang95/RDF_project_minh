    #         text/plain:
    #           schema:
    #             type: string
    #             example: Oops, error. Please contact an administrator.

  /api/annotation/user:
    get:
      tags:
        - RDF
      summary: Get annotations for current user
      operationId: getAnnotationsByUser
      responses:
        "200":
          description: Annotations retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Annotation"
        "500":
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
                example: Oops, error. Please contact an administrator.

  /api/plugin:
    get:
      tags:
        - Plugin
      summary: Download plugin
      operationId: downloadPlugin
      responses:
        "200":
          description: Plugin downloaded successfully
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "500":
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
                example: Oops, error. Please contact an administrator.
